name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" 2>/dev/null | tail -1

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap (skip JDK/SDK prompts)
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json <<EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_SDK_ROOT"
          }
          EOF

      - name: Generate Android project
        run: |
          bubblewrap init \
            --manifest https://anashath.github.io/thasbeeh/manifest.json \
            --directory ./android-twa
        env:
          BUBBLEWRAP_NON_INTERACTIVE: true

      - name: Build debug APK
        working-directory: ./android-twa
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Sign APK with debug key
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -dname "CN=Sacred Devotion,O=Thasbeeh,C=MY" \
            -keyalg RSA -keysize 2048 \
            -validity 10000 2>/dev/null

          APK=$(find android-twa -name "*.apk" | head -1)
          cp "$APK" Thasbeeh.apk

          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks debug.keystore \
            --ks-pass pass:android \
            --ks-key-alias androiddebugkey \
            --key-pass pass:android \
            --out Thasbeeh-signed.apk \
            Thasbeeh.apk

          echo "✅ APK built and signed: Thasbeeh-signed.apk"
          ls -lh Thasbeeh-signed.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Thasbeeh-Android-APK
          path: Thasbeeh-signed.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/master'
        with:
          tag_name: apk-${{ github.run_number }}
          name: "Thasbeeh Android APK (Build ${{ github.run_number }})"
          body: |
            ## Sacred Devotion – Thasbeeh Android App

            ### Install Instructions
            1. Download `Thasbeeh-signed.apk` below
            2. On your Android phone: Settings → Security → **Allow unknown sources** (or "Install unknown apps")
            3. Open the downloaded APK file and tap **Install**
            4. Open **Thasbeeh** from your home screen

            > Built from commit ${{ github.sha }}
          files: Thasbeeh-signed.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
