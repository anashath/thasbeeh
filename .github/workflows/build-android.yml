name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Sign APK
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk

          keytool -genkeypair -v \
            -keystore release.keystore \
            -storepass thasbeeh123 \
            -alias thasbeeh \
            -keypass thasbeeh123 \
            -dname "CN=Sacred Devotion,O=Thasbeeh,C=MY" \
            -keyalg RSA -keysize 2048 \
            -validity 10000 2>/dev/null

          $ANDROID_SDK_ROOT/build-tools/34.0.0/zipalign -f 4 "$APK" Thasbeeh-aligned.apk
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks release.keystore \
            --ks-pass pass:thasbeeh123 \
            --ks-key-alias thasbeeh \
            --key-pass pass:thasbeeh123 \
            --out Thasbeeh.apk \
            Thasbeeh-aligned.apk

          echo "✅ APK signed: $(ls -lh Thasbeeh.apk)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Thasbeeh-Android-APK
          path: Thasbeeh.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Thasbeeh Android v1.0.${{ github.run_number }}"
          body: |
            ## 📱 Sacred Devotion – Thasbeeh Android App

            ### Install on Android
            1. Download **Thasbeeh.apk** below
            2. On your phone: **Settings → Security → Install unknown apps** → allow your browser/Files app
            3. Tap the downloaded APK → **Install**
            4. Open **Thasbeeh** from your home screen — no browser bar, works offline ✅
          files: Thasbeeh.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
